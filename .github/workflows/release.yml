name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Run only after main-branch pushes (not forks) and not for [skip ci] commits
    # that semantic-release itself produces when writing CHANGELOG.md back.
    if: >-
      github.repository == 'jeswr/reactive-fetch' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use GH_TOKEN so the tag/commit pushes from semantic-release trigger
          # downstream workflows (github.token doesn't, per GitHub docs).
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        # Use the root `build` script (packages/* only). Examples and e2e are
        # private workspaces and are already ignored by --ignore-private-packages
        # in the release step; building them here would just slow releases down
        # and let a broken example block an otherwise-valid core/react publish.
        run: pnpm build

      - name: Record pre-release SHA
        id: pre
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Release to npm
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: pnpm exec multi-semantic-release --ignore-private-packages --deps.bump=satisfy --deps.prefix='^'

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@jeswr'

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}
          PRE_SHA: ${{ steps.pre.outputs.sha }}
        # Fetch the freshly-written semantic-release commits that @semantic-release/git
        # pushed to origin/main during "Release to npm". `pull --ff-only` is safe because
        # the local branch was at PRE_SHA and the remote has only advanced from there.
        run: |
          set -euo pipefail
          git fetch origin main
          git pull --ff-only origin main
          # Collect every packages/*/package.json touched in the release range.
          # This is the authoritative signal that multi-semantic-release bumped a package.
          # Read line-by-line instead of piping through xargs so an empty diff is handled
          # cleanly (bare xargs on empty input under `set -e` fails the step).
          manifests=$(git diff --name-only "${PRE_SHA}..HEAD" -- 'packages/*/package.json')
          if [ -z "${manifests}" ]; then
            echo "No packages were released on this run — skipping GitHub Packages mirror."
            exit 0
          fi
          while IFS= read -r manifest; do
            pkg=$(dirname "${manifest}")
            echo "::group::Mirror ${pkg} to GitHub Packages"
            # E409 is the npm response for "this version already exists" — benign on retry
            # but every other failure (auth, network, manifest validation) should fail the job.
            if ! (cd "${pkg}" && npm publish --access public --no-provenance 2> >(tee /tmp/npm-stderr >&2)); then
              if grep -qE 'E(PUBLISHCONFLICT|409)|cannot publish over' /tmp/npm-stderr; then
                echo "${pkg}: version already published to GitHub Packages — skipping."
              else
                echo "::error::${pkg}: publish to GitHub Packages failed"
                exit 1
              fi
            fi
            echo "::endgroup::"
          done <<< "${manifests}"
