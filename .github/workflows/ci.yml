name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: packages/*/dist
          retention-days: 1

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (typecheck depends on built dist types)
        run: pnpm --filter './packages/*' build

      - name: Typecheck all packages
        run: pnpm -r typecheck

  test:
    name: Test (node ${{ matrix.node }}, ${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '22.x', '24.x']
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.sha }}
          path: packages

      - name: Run unit tests
        run: pnpm --filter './packages/*' test

  e2e:
    name: E2E (Playwright chromium)
    needs: build
    timeout-minutes: 20
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.sha }}
          path: packages

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pw-${{ runner.os }}-

      - name: Install Playwright browsers
        run: pnpm --filter @jeswr/reactive-fetch-e2e exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @jeswr/reactive-fetch-e2e test:chromium

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 14

      - name: Upload trace artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: e2e/test-results
          retention-days: 14

  security:
    name: Security
    # Runs in parallel with test/e2e — this job is purely about invariants,
    # it doesn't depend on built artifacts.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production deps for known vulnerabilities
        # `--prod` scopes to what ships to consumers; dev deps are allowed to
        # carry known advisories that don't reach a published artifact.
        # `--audit-level=high` fails only on High/Critical — Moderate/Low are
        # surfaced in the log but don't block merges; they're tracked via
        # Dependabot instead.
        run: pnpm audit --prod --audit-level=high

      - name: Run security-invariant tests
        # Covers the postMessage/eval/innerHTML/etc. source-grep assertions in
        # packages/core/src/security.test.ts. Does not require a build.
        run: pnpm --filter @jeswr/solid-reactive-fetch test -- src/security.test.ts
