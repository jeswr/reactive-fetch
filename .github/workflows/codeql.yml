name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly — Tuesday at 10:35 UTC, matching eye-js's cadence. GitHub
    # staggers its security-advisory releases on Tuesdays, so weekly runs
    # here pick up new queries without spamming PR checks.
    - cron: '35 10 * * 2'

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      # Required for CodeQL to upload results.
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        # Single language; `javascript-typescript` covers both.
        language: ['javascript-typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use the default query suite plus `security-extended` for a
          # slightly broader ruleset (high-confidence security queries).
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
