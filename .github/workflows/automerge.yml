# Auto-merge Dependabot PRs for minor/patch updates once CI passes.
# DISABLED BY DEFAULT — remove the `if: false &&` guard on the job below to
# enable. Kept here so the config is ready when the maintainer wants it.
#
# Uses `pull_request_target` (not `pull_request`) so the workflow runs with
# the base-branch secrets and a writable token — Dependabot PRs opened via
# `pull_request` only receive a read-only token, which would make
# `gh pr merge --auto` fail. `pull_request_target` is safe here because we
# never check out or execute PR code.
#
# Requires:
# - Repo setting: General → "Allow auto-merge" is enabled
# - Repo setting: "Allow GitHub Actions to create and approve pull requests"
# - Branch protection on `main` requires CI to pass before merge
name: Dependabot auto-merge

on:
  pull_request_target:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: false && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor/patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
