version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
    groups:
      minor:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # @vitejs/plugin-react v6 requires vite v7; we ship examples on vite
      # 6.x (which itself is coupled to @uvdsl/solid-oidc-client-browser's
      # jose transitive). Re-evaluate when the example apps are ready to
      # move to vite 7 or later.
      - dependency-name: "@vitejs/plugin-react"
        versions: [">=6.0.0"]
      # vite v7+ pairs with @vitejs/plugin-react v6+; same deferral.
      - dependency-name: "vite"
        versions: [">=7.0.0"]
      # TypeScript 6 broke tsup's DTS emission path at the time we last
      # tried. Stay on 5.x until tsup catches up and we can retest.
      - dependency-name: "typescript"
        versions: [">=6.0.0"]
      # @rdfjs/wrapper 0.33 already landed the TermWrapper refactor that
      # breaks our `WebIdAgent` subclass (packages/core/src/callback/
      # resolveWebId.ts) and the transitive `@solid/object` consumer: both
      # expect the 0.32-era private `original` field and `this.objects(...)`
      # instance helpers, while 0.33 moves helpers to static classes and
      # changes the private field shape. Dependabot PR #11 surfaced this —
      # CI failed on typecheck (`TS2345` on a `termToString` cast) and on
      # runtime (`TypeError: Object must be a class TermWrapper`).
      # Tighten the floor to >=0.33.0 so future Dependabot runs don't
      # reopen the same dead-end PR. Revisit when we need a capability
      # 0.32 doesn't expose and are ready to migrate to the static API.
      - dependency-name: "@rdfjs/wrapper"
        versions: [">=0.33.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
